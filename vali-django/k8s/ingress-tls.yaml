# cert-manager ClusterIssuer (Let's Encrypt production)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: michael.a.trestman@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: gce
---
# TLS certificate for project-safeguard.ai
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: safeguard-tls
  namespace: safeguard
spec:
  secretName: safeguard-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - project-safeguard.ai
    - www.project-safeguard.ai
---
# Ingress — TLS termination via cert-manager cert
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safeguard-ingress
  namespace: safeguard
  annotations:
    kubernetes.io/ingress.global-static-ip-name: safeguard-vali-ip
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - project-safeguard.ai
        - www.project-safeguard.ai
      secretName: safeguard-tls-secret
  rules:
    - host: project-safeguard.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vali-django
                port:
                  number: 9090
    - host: www.project-safeguard.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vali-django
                port:
                  number: 9090
