# Two secrets the Deployment needs. DO NOT commit real values.
#
# 1. Django secret key (any random string for this app — not used to sign
#    user sessions, just to satisfy Django settings).
---
apiVersion: v1
kind: Secret
metadata:
  name: vali-django-secret
type: Opaque
stringData:
  django-secret-key: "REPLACE_ME_WITH_RANDOM_STRING"
---
# 2. Wallet files. Mounted at /root/.bittensor in the pod. The keys in
#    `data` map to file paths *under that mount*. So a key named
#    `wallets/miner2/hotkeys/default` becomes the file
#    /root/.bittensor/wallets/miner2/hotkeys/default — exactly the layout
#    bittensor_wallet expects.
#
# Create with:
#   kubectl create secret generic vali-django-wallets \
#     --from-file=wallets/SuperPractice/coldkeypub.txt=$HOME/.bittensor/wallets/SuperPractice/coldkeypub.txt \
#     --from-file=wallets/SuperPractice/hotkeys/default=$HOME/.bittensor/wallets/SuperPractice/hotkeys/default
#
# (do NOT include the coldkey private file unless this validator needs to
# sign coldkey-authorized extrinsics, which for set_weights it does not.)
apiVersion: v1
kind: Secret
metadata:
  name: vali-django-wallets
type: Opaque
# Populate via kubectl create secret generic ... --from-file ... rather than
# putting key material in this YAML.
