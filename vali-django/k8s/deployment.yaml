apiVersion: apps/v1
kind: Deployment
metadata:
  name: vali-django
  namespace: safeguard
  labels: { app: vali-django }
spec:
  replicas: 1
  # NOTE: Recreate (not RollingUpdate) because the ReadWriteOnce PVC
  # can only be mounted by one pod at a time. For zero-downtime deploys,
  # remove the PVC dependency or switch to ReadWriteMany storage.
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: vali-django }
  template:
    metadata:
      labels: { app: vali-django }
    spec:
      containers:
        - name: vali
          image: us-central1-docker.pkg.dev/safeguard-testnet/safeguard/vali-django:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: VALIDATOR_WALLET
              value: "SuperPractice"
            - name: VALIDATOR_HOTKEY
              value: "default"
            - name: SUBTENSOR_NETWORK
              value: "test"
            - name: NETUID
              value: "444"
            - name: VALIDATOR_DISPLAY_NAME
              value: "Trexman"
            - name: SAFEGUARD_RELAY_ENDPOINT
              value: "http://136.116.237.112:9090/probe/relay"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: django-secret-key
            - name: CHUTES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: chutes-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: database-url
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: admin-user
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: admin-pass
            - name: HEALTH_MAX_TICK_AGE_S
              value: "600"
            # Tempo is 360 blocks (~72 min); set_weights only fires at
            # tempo boundaries, so the age naturally grows up to that
            # full tempo between calls. 5400s = 90 min gives tempo + 18
            # min headroom. Upstream default of 1800 caused /healthz
            # to flap to 503 for roughly half of every cycle and took
            # the pod out of the LB endpoint pool on each flap.
            - name: HEALTH_MAX_WEIGHT_AGE_S
              value: "5400"
            # How many probes each eligible miner gets per dispatch cycle
            # per target. Raising this scales data throughput linearly
            # WITHOUT forcing operators to scale UID count — scoring is
            # additive per UID across probes, so one capable miner at
            # N=10 earns 10x the contribution of one miner at N=1. The
            # antidote to the UID-sharding antipattern. Watch cycle time
            # as you raise this — audit runs serialized per-row, so total
            # cycle time scales with (eligible_miners × targets × N).
            - name: PROBES_PER_MINER_PER_CYCLE
              value: "3"
            # Concurrent in-flight probe HTTP requests across one cycle.
            # Default 8; raise if PROBES_PER_MINER_PER_CYCLE × eligible
            # miners exceeds 8 so the semaphore isn't the bottleneck.
            - name: MAX_PROBE_CONCURRENCY
              value: "16"
            # DB connection pooling. Enabled on test (CONN_MAX_AGE=60) but
            # reverted to 0 on prod 2026-04-13 after /healthz began returning
            # 500s — sync view's `ValidatorStatus.get()` query was getting
            # stale connections that CONN_HEALTH_CHECKS didn't catch on this
            # Django 5 + psycopg2 combo. Liveness probe kept restarting the
            # pod. Investigate properly on test stack before re-enabling on
            # prod. See safeguard-ops Operational Notes.
            - name: DB_CONN_MAX_AGE
              value: "0"
          volumeMounts:
            - name: wallets
              mountPath: /root/.bittensor/wallets/SuperPractice/hotkeys/default
              subPath: hotkey
              readOnly: true
            - name: wallets
              mountPath: /root/.bittensor/wallets/SuperPractice/coldkeypub.txt
              subPath: coldkeypub.txt
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "1000m", memory: "2Gi" }
      volumes:
        - name: wallets
          secret:
            secretName: wallet-superpractice
        - name: data
          persistentVolumeClaim:
            claimName: vali-django-data
---
apiVersion: v1
kind: Service
metadata:
  name: vali-django
  namespace: safeguard
spec:
  type: LoadBalancer
  selector: { app: vali-django }
  ports:
    - port: 80
      targetPort: 9090
      name: http
    - port: 9090
      targetPort: 9090
      name: http-legacy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vali-django-data
  namespace: safeguard
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
