apiVersion: apps/v1
kind: Deployment
metadata:
  name: vali-django
  namespace: safeguard
  labels: { app: vali-django }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: vali-django }
  template:
    metadata:
      labels: { app: vali-django }
    spec:
      containers:
        - name: vali
          image: us-central1-docker.pkg.dev/safeguard-testnet/safeguard/vali-django:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: VALIDATOR_WALLET
              value: "SuperPractice"
            - name: VALIDATOR_HOTKEY
              value: "default"
            - name: SUBTENSOR_NETWORK
              value: "test"
            - name: NETUID
              value: "444"
            - name: SAFEGUARD_RELAY_ENDPOINT
              value: "http://35.188.58.40:9090/probe/relay"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: django-secret-key
            - name: CHUTES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: chutes-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: database-url
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: admin-user
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: admin-pass
            - name: HEALTH_MAX_TICK_AGE_S
              value: "600"
            - name: HEALTH_MAX_WEIGHT_AGE_S
              value: "1800"
          volumeMounts:
            - name: wallets
              mountPath: /root/.bittensor/wallets/SuperPractice/hotkeys/default
              subPath: hotkey
              readOnly: true
            - name: wallets
              mountPath: /root/.bittensor/wallets/SuperPractice/coldkeypub.txt
              subPath: coldkeypub.txt
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
      volumes:
        - name: wallets
          secret:
            secretName: wallet-superpractice
        - name: data
          persistentVolumeClaim:
            claimName: vali-django-data
---
apiVersion: v1
kind: Service
metadata:
  name: vali-django
  namespace: safeguard
spec:
  type: LoadBalancer
  selector: { app: vali-django }
  ports:
    - port: 9090
      targetPort: 9090
      name: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vali-django-data
  namespace: safeguard
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
