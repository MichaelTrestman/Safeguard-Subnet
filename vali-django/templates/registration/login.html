<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Safeguard Validator — Login</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0a0a0a; color: #e0e0e0; padding: 2rem;
           display: flex; justify-content: center; align-items: center;
           min-height: 100vh; margin: 0; }
    .login-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
                 padding: 2rem; width: 320px; }
    h1 { color: #fff; font-size: 1.2rem; margin: 0 0 1.5rem; }
    label { display: block; color: #888; font-size: 0.8rem; text-transform: uppercase;
            margin-bottom: 0.3rem; }
    input { width: 100%; padding: 0.6rem; background: #0a0a0a; border: 1px solid #444;
            border-radius: 4px; color: #e0e0e0; font-size: 1rem;
            margin-bottom: 1rem; box-sizing: border-box; }
    input:focus { border-color: #88f; outline: none; }
    button { width: 100%; padding: 0.7rem; background: #336; border: none;
             border-radius: 4px; color: #fff; font-size: 1rem; cursor: pointer; }
    button:hover { background: #448; }
    .error { color: #ff4444; font-size: 0.85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Safeguard Validator</h1>
    {% if form.errors %}
      <div class="error">Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus>
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
