<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safeguard HITL Miner</title>
  <link rel="stylesheet" href="/style.css">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' https://esm.sh 'wasm-unsafe-eval'; connect-src 'self' ws: wss: https://esm.sh; style-src 'self' 'unsafe-inline';">
</head>
<body>

  <!-- Status bar (hidden until authenticated) -->
  <div class="status-bar" id="status-bar" style="display:none">
    <div class="connection">
      <div class="status-dot" id="status-dot"></div>
      <span id="connection-text">Connected</span>
    </div>
    <div class="address" id="status-address"></div>
    <div class="stats" id="status-stats">0 labeled this session</div>
  </div>

  <!-- Main content area -->
  <div class="main" id="main-content">
    <!-- Populated by app.js -->
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
